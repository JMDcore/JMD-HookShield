name: Bug report
description: Report a reproducible non-security defect
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: "Do not report vulnerabilities here. Use SECURITY.md."
  - type: textarea
    id: observed
    attributes:
      label: Observed behaviour
      description: What happened with synthetic data?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Include commands, scenario, provider adapter, and sanitised output.
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: macOS 15, Node 22, pnpm 11
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Safety confirmation
      options:
        - label: I removed secrets, tokens, personal payloads, and unauthorised target details.
          required: true
