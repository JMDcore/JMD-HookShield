name: Feature request
description: Propose a scoped product or security improvement
title: "feat: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What operator or AppSec problem should be solved?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behaviour
    validations:
      required: true
  - type: textarea
    id: threats
    attributes:
      label: Threat-model impact
      description: Which inputs, trust boundaries, secrets, or network paths change?
    validations:
      required: true
  - type: dropdown
    id: demo
    attributes:
      label: Local demo impact
      options:
        - No new infrastructure
        - Optional infrastructure only
        - Requires architecture discussion
    validations:
      required: true
